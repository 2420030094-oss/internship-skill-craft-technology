<!DOCTYPE html>
<html>
<head>
    <title>SkillCraft Task 01</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
        }

        .container{
            width:70%;
            margin:auto;
        }
    </style>

</head>
<body>

    <h1>Gender Distribution</h1>

    <div class="container">
        <canvas id="myChart"></canvas>
    </div>

    <script>

        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Male', 'Female'],
                datasets: [{
                    label: 'Population',
                    data: [600, 400]
                }]
            },
            options: {
                responsive: true
            }
        });

    </script>

</body>
</html>
